<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://127.0.0.1:5199; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>Pinmo</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">P</div>
        <div>
          <h1>Pinmo</h1>
          <p>Endpoint Monitor</p>
        </div>
      </div>
      <nav class="nav">
        <button class="nav-link active" data-page="dashboard">
          <span class="nav-icon">◉</span> Dashboard
        </button>
        <button class="nav-link" data-page="endpoints">
          <span class="nav-icon">＋</span> Add Endpoints
        </button>
        <button class="nav-link" data-page="settings">
          <span class="nav-icon">⚙</span> Settings
        </button>
      </nav>
      <div class="sidebar-footer">
        <span id="connection-status" class="status-pill status-unknown">Connecting…</span>
      </div>
    </aside>

    <main class="content">
      <section id="page-dashboard" class="page active">
        <header class="page-header">
          <div>
            <h2>Dashboard</h2>
            <p>Live overview of your monitored endpoints</p>
          </div>
          <div class="page-header-actions">
            <button id="reset-dashboard" class="btn btn-secondary">Reset</button>
            <button id="refresh-dashboard" class="btn btn-secondary">Refresh</button>
          </div>
        </header>

        <div class="panel">
          <div class="panel-header">
            <h3>Endpoints</h3>
          </div>
          <div id="dashboard-endpoints" class="data-table-wrap"></div>
        </div>
      </section>

      <section id="page-endpoints" class="page">
        <header class="page-header">
          <div>
            <h2>Add Endpoints</h2>
            <p>Register URLs to monitor on a schedule</p>
          </div>
        </header>

        <div class="panel">
          <form id="endpoint-form" class="form-grid">
            <div class="form-field">
              <label for="endpoint-url">URL or IP</label>
              <input id="endpoint-url" name="url" type="text" placeholder="example.com or 192.168.1.1" required>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary" id="endpoint-submit">Add endpoint</button>
              <button type="button" class="btn btn-ghost" id="endpoint-cancel" hidden>Cancel edit</button>
            </div>
          </form>
        </div>

        <div class="panel">
          <div class="panel-header">
            <h3>Registered endpoints</h3>
          </div>
          <div id="managed-endpoints" class="data-table-wrap"></div>
        </div>
      </section>

      <section id="page-settings" class="page">
        <header class="page-header">
          <div>
            <h2>Settings</h2>
            <p>Configure global monitoring behavior</p>
          </div>
        </header>

        <div class="panel">
          <form id="settings-form" class="form-grid">
            <div class="form-field">
              <label for="settings-default-interval">Interval</label>
              <select id="settings-default-interval" required>
                <option value="1">Every 1 second</option>
                <option value="5" selected>Every 5 seconds</option>
                <option value="10">Every 10 seconds</option>
                <option value="15">Every 15 seconds</option>
                <option value="30">Every 30 seconds</option>
                <option value="45">Every 45 seconds</option>
                <option value="60">Every 60 seconds</option>
              </select>
            </div>
            <div class="form-field">
              <label for="settings-default-packets">Packets per check</label>
              <select id="settings-default-packets" required>
                <option value="2">2 packets</option>
                <option value="4">4 packets</option>
                <option value="8">8 packets</option>
                <option value="16">16 packets</option>
              </select>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Save settings</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
